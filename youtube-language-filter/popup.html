<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Language Filter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>YouTube Language Filter</h1>

  <div class="toggles">
    <label class="toggle-row">
      <span>Hide homepage feed</span>
      <span class="switch">
        <input type="checkbox" id="hide-home">
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle-row">
      <span>Hide watch page sidebar</span>
      <span class="switch">
        <input type="checkbox" id="hide-sidebar">
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle-row">
      <span>Hide Shorts</span>
      <span class="switch">
        <input type="checkbox" id="hide-shorts">
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle-row">
      <span>Hide Playables</span>
      <span class="switch">
        <input type="checkbox" id="hide-playables">
        <span class="slider"></span>
      </span>
    </label>
  </div>

  <button id="toggle-btn">Insert / Show YouTube Data API v3 Key</button>
  <p id="key-status"></p>

  <div id="key-section" hidden>
    <input id="key" type="text" placeholder="AIzaSy…" autocomplete="off" spellcheck="false">
    <div id="actions">
      <button id="save">Save</button>
      <button id="clear">Clear</button>
    </div>
    <p class="hint">
      Get a free key: <b>console.cloud.google.com</b><br>
      → Enable <b>YouTube Data API v3</b> → Credentials
    </p>
  </div>

  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
